  <rect x="78" y="78" width="1044" height="744" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="120" y="170" fill="#f1e0cf" font-size="34" font-family="Poppins, Arial, sans-serif" letter-spacing="6">UE5 SHOWCASE</text>
  <text x="120" y="255" fill="#ffffff" font-size="72" font-family="Poppins, Arial, sans-serif" font-weight="700">Gameplay Space</text>
  <text x="120" y="320" fill="#d7c9bb" font-size="28" font-family="Poppins, Arial, sans-serif">Traversal, combat, interaction, or readability shot</text>
