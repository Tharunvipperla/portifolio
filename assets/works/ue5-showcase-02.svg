<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">UE5 gameplay space placeholder</title>
  <desc id="desc">Abstract placeholder artwork for a gameplay-focused Unreal Engine screenshot.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1012" />
      <stop offset="45%" stop-color="#13181b" />
      <stop offset="100%" stop-color="#090909" />
    </linearGradient>
    <radialGradient id="accent" cx="72%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#d19b5e" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#d19b5e" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#d19b5e" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0d0aa" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#b74b4b" stop-opacity="0.15" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" />
