    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5dfcf" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#b74b4b" stop-opacity="0.15" />
