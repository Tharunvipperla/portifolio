      <stop offset="100%" stop-color="#090909" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#da7664" stop-opacity="0.9" />
      <stop offset="55%" stop-color="#b74b4b" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#b74b4b" stop-opacity="0" />
