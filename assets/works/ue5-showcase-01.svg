<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">UE5 environment composition placeholder</title>
  <desc id="desc">Abstract cinematic placeholder artwork for a featured Unreal Engine render.</desc>
  <defs>
